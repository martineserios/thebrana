# Brana Knowledge Ontology — Minimal Viable (v1)
#
# ADR-021: 5 entity types + 5 relationship types.
# Extend when ambiguity causes misclassification (see t-433).
#
# Usage: typed links in reasoning docs use these types.
#   Example: [ADR-019 assumes](path.md) instead of bare [doc NN](path.md)
#   validate.sh Check 18 enforces typed links in reasoning docs.

entity_types:
  - name: Document
    description: Any knowledge artifact (dimension, reflection, ADR, guide)
    examples: [dimension doc, ADR, ARCHITECTURE.md, LIFECYCLE.md]

  - name: Assumption
    description: Explicit tracked claim that may become invalid
    examples: ["ruflo is enhancement, not hard dependency", "160 nodes won't hit 500 in 6 months"]

  - name: FieldNote
    description: Practical learning captured during work sessions
    examples: ["Docker encrypted overlay fails on Hetzner", "gh CLI --jq piped output fails in sandbox"]

  - name: Component
    description: Implemented system element (skill, hook, agent, rule, script)
    examples: [/brana:build, PreToolUse hook, challenger agent, sdd-tdd rule]

  - name: Task
    description: Backlog item tracked in tasks.json
    examples: [t-444, ms-051, ph-001]

relationship_types:
  - name: assumes
    from: [Document]
    to: [Assumption]
    description: Document relies on this assumption being true

  - name: implements
    from: [Component]
    to: [Document]
    description: Code/config that realizes a documented decision

  - name: informs
    from: [Document]
    to: [Document]
    description: Research or knowledge that shaped a decision or design

  - name: enriches
    from: [FieldNote]
    to: [Document]
    description: Practical learning that adds depth to a document

  - name: supersedes
    from: [Document]
    to: [Document]
    description: Newer document replaces an older one

# Dimension classification
#
# "maintain" = actively evolving topic, staleness enforcement applies
# "snapshot" = point-in-time research, timestamped, no enforcement
#
# validate.sh only checks freshness on "maintain" dimensions.
