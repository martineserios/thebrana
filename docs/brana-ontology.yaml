# Brana Knowledge Ontology — v1.5 (Measurement-Gated)
#
# Schema definition for the brana knowledge system.
# Per ADR-028: 3-layer architecture (schema -> frontmatter -> graph).
#
# Phase A ships 5 active types + 3 relationships.
# Remaining types/relationships are documented but deferred until
# usage metrics justify activation (30-day zero-usage demotion rule).
#
# Sources: Lindenberg (3-layer ontology), Seale (minimal viable graph),
# Jorgenson (DOS framework), Vanderseypen (dynamic schema).
#
# validate.sh Check 18 enforces typed links using these types.
# dimension_classes preserved from v1 for staleness enforcement.

# ─────────────────────────────────────────────
# TYPES (what exists in the knowledge system)
# ─────────────────────────────────────────────

types:

  # --- Active (Phase A) ---

  - name: Dimension
    description: Deep research doc on a domain topic.
    location: brana-knowledge/dimensions/
    status: active

  - name: Reflection
    description: Cross-cutting synthesis across dimensions.
    location: docs/reflections/
    status: active

  - name: ADR
    description: Architecture Decision Record.
    location: docs/architecture/decisions/
    status: active

  - name: Pattern
    description: Reusable solution stored in ruflo memory and memory files.
    location: ruflo (namespace pattern) + ~/.claude/memory/
    status: active

  - name: Roadmap
    description: Implementation plan.
    location: docs/
    status: active

  # --- Deferred (documented, not processed until usage data justifies) ---

  - name: FieldNote
    description: Practical learning captured during work sessions.
    status: deferred

  - name: Assumption
    description: Explicit tracked claim that may become invalid.
    status: deferred

  - name: Constraint
    description: Hard boundary that limits design choices.
    status: deferred

  - name: Experiment
    description: Time-boxed test of a hypothesis.
    status: deferred

  - name: Task
    description: Unit of work in the backlog.
    location: .claude/tasks.json
    status: deferred

  - name: Milestone
    description: Significant deliverable or checkpoint.
    status: deferred

  - name: Phase
    description: Group of related tasks toward a milestone.
    status: deferred

  - name: Skill
    description: Workflow definition for a type of work.
    location: system/skills/
    status: deferred

  - name: Hook
    description: Event-driven automation.
    location: system/hooks/
    status: deferred

  - name: Rule
    description: Behavioral constraint loaded into context.
    location: system/rules/
    status: deferred

# ─────────────────────────────────────────────
# RELATIONSHIPS (how things connect)
# ─────────────────────────────────────────────

relationships:

  # --- Active (Phase A) ---

  - name: depends_on
    description: A requires B to be understood or completed first.
    properties:
      transitive: true
    status: active

  - name: informs
    description: A provides context that shaped B.
    properties:
      transitive: false
    status: active

  - name: supersedes
    description: A replaces B. Chain must be complete (no gaps).
    properties:
      transitive: false
      chain_complete: true
    status: active

  # --- Deferred (documented, not processed until usage data justifies) ---

  - name: contradicts
    description: Conflicting claims between A and B. Triggers LARGE evaluation.
    properties:
      symmetric: true
    status: deferred

  - name: implements
    description: Code or config that realizes a documented decision.
    status: deferred

  - name: applies_to
    description: Knowledge or capability relevant to a specific client.
    status: deferred

  - name: produced_by
    description: Artifact created during a session or by a skill.
    status: deferred

  - name: decided_by
    description: System component justified by an architecture decision.
    status: deferred

  - name: blocked_by
    description: A cannot proceed until B is resolved.
    properties:
      transitive: true
    status: deferred

  - name: tested_by
    description: A is validated by B (test, experiment, or metric).
    status: deferred

  - name: triggered_by
    description: A is activated in response to B (event-driven).
    status: deferred

# ─────────────────────────────────────────────
# AXIOMS (rules the system can enforce)
# ─────────────────────────────────────────────

axioms:

  - id: transitivity
    rule: depends_on is transitive
    formal: "if depends_on(A, B) and depends_on(B, C) then depends_on(A, C)"

  - id: supersession_chain
    rule: supersedes must form complete chains (no gaps)
    formal: "if supersedes(A, B) then status(B) = superseded"

  - id: contradiction_flag
    rule: contradicts triggers LARGE evaluation gate
    formal: "if contradicts(A, B) then flag_for_review(A, B, tier=LARGE)"

  - id: single_source
    rule: Each fact has exactly one authoritative source
    formal: "for each fact F, exactly one node is authoritative"

  - id: staleness
    rule: Nodes older than 90 days with no search hits get stale warning
    formal: "if age(N) > 90d and search_hits(N) = 0 then warn(N, stale)"

  - id: orphan_detection
    rule: Nodes with zero edges are flagged for review
    formal: "if degree(N) = 0 then flag_for_review(N, orphan)"

