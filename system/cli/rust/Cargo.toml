[package]
name = "brana"
version = "0.1.0"
edition = "2024"
description = "Brana CLI — fast standalone terminal interface"

[[bin]]
name = "brana"
path = "src/main.rs"

[[bin]]
name = "brana-query"
path = "src/query.rs"

[[bin]]
name = "brana-fmt"
path = "src/fmt.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }
chrono = "0.4"
anyhow = "1"

[profile.release]
opt-level = "z"
lto = true
strip = true
