[package]
name = "brana-query"
version = "0.1.0"
edition = "2024"
description = "Fast JSON task filter for brana CLI"

[[bin]]
name = "brana-query"
path = "src/main.rs"

[[bin]]
name = "brana-fmt"
path = "src/fmt.rs"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
clap = { version = "4", features = ["derive"] }

[profile.release]
opt-level = "z"
lto = true
strip = true
